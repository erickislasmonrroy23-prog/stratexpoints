<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>StratexPoints — AI Strategic Intelligence</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
    <style>
      *{margin:0;padding:0;box-sizing:border-box;}
      :root{
        --bg:#F4F6F9;--bg2:#ffffff;--bg3:#F8FAFC;--border:#E8ECF0;
        --text:#0F172A;--text2:#475569;--text3:#94A3B8;
        --primary:#1E6FFF;--primary-light:#EEF4FF;
        --teal:#0EA5A0;--teal-light:#EDFAFA;
        --red:#EF4444;--red-light:#FEE2E2;
        --green:#10B981;--green-light:#D1FAE5;
        --gold:#F59E0B;--gold-light:#FEF3C7;
        --violet:#8B5CF6;--violet-light:#EDE9FE;
        --shadow:0 1px 3px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04);
        --shadow-md:0 4px 12px rgba(0,0,0,.07),0 2px 4px rgba(0,0,0,.04);
        --shadow-lg:0 10px 24px rgba(0,0,0,.08),0 4px 6px rgba(0,0,0,.04);
        --radius:12px;--radius-sm:8px;--radius-lg:16px;
      }
      [data-theme="dark"]{
        --bg:#0F172A;--bg2:#1E293B;--bg3:#162032;--border:#2D3748;
        --text:#F1F5F9;--text2:#94A3B8;--text3:#4A5568;
        --primary:#3B82F6;--primary-light:#1E3A5F;
        --red-light:#3D1515;--green-light:#0D3325;
        --gold-light:#3D2D00;--violet-light:#2D1B5E;
        --shadow:0 1px 3px rgba(0,0,0,.3);
        --shadow-md:0 4px 12px rgba(0,0,0,.3);
        --shadow-lg:0 10px 24px rgba(0,0,0,.4);
      }
      body{font-family:'Plus Jakarta Sans',system-ui,sans-serif;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased;}
      *{transition:background-color .2s,border-color .2s,color .15s;}
      ::-webkit-scrollbar{width:5px;height:5px;}
      ::-webkit-scrollbar-track{background:transparent;}
      ::-webkit-scrollbar-thumb{background:var(--border);border-radius:99px;}
      button,input,select,textarea{font-family:'Plus Jakarta Sans',system-ui,sans-serif;}
      @keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}
      @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
      @keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
      @keyframes scaleIn{from{opacity:0;transform:scale(.96)}to{opacity:1;transform:scale(1)}}
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/main.jsx"></script>
  </body>
</html>
